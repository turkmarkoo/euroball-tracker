name: EuroBall Moves — Scrape Transfers

on:
  schedule:
    - cron: "*/30 6-23 * * *"
    - cron: "0 0-5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scrape.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated JSON files
        run: |
          git config user.name  "EuroBall Scraper Bot"
          git config user.email "scraper@euroball.moves"
          git add transfers_all.json transfers_new.json
          git diff --cached --quiet || git commit -m "🏀 Auto-scrape $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
