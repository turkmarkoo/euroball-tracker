name: EuroBall Moves — Scrape Transfers

on:
  schedule:
    # Every 30 minutes during peak transfer hours (06:00–23:00 UTC)
    - cron: "*/30 6-23 * * *"
    # Every 2 hours overnight
    - cron: "0 0-5 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit JSON output back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated JSON files
        run: |
          git config user.name  "EuroBall Scraper Bot"
          git config user.email "scraper@euroball-moves"
          git add transfers_all.json transfers_new.json
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "🏀 Auto-scrape $(date -u '+%Y-%m-%d %H:%M UTC') — ${{ env.NEW_COUNT }} new"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
