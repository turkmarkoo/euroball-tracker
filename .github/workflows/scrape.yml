name: EuroBall Moves — Scrape Transfers

on:
  # Scheduled scraping disabled — fetching is now on-demand via browser.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run browser scraper (EuroCup, EuroLeague, ABA Liga, BNXT)
        run: python scrape_browser.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated JSON files
        run: |
          git config user.name  "EuroBall Scraper Bot"
          git config user.email "scraper@euroball.moves"
          git add transfers_all.json transfers_new.json
          git diff --cached --quiet || git commit -m "🏀 Auto-scrape $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
