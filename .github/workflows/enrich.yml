name: Enrich transfers with contract + birth year
on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run enrichment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python enrich_transfers.py
      - name: Commit enriched data
        run: |
          git config user.name "EuroBall Bot"
          git config user.email "bot@euroball.moves"
          git add transfers_all.json transfers_new.json
          git diff --cached --quiet || git commit -m "Enrich existing transfers with contract + birth year from articles"
          git push
